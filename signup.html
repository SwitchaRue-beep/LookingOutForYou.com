<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LookingOutForYou - Nutrition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="signup-page">
  <form class="signup-card" action="index.html" method="get">
  <a href="index.html" class="back-link">← Back</a>
    <h2>Create Account</h2>
    <p>Join us today to get started.</p>
    
    <div class="input-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="John Doe" required>
    </div>
    
    <div class="input-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="john@example.com" required>
    </div>
    
    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" required>
    </div>
    
    <button type="submit" onclick="window.location.href='index.html'; return false;">Sign Up</button>
    
  </form>
</div>

</body>
</html>
